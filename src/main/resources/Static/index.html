<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WATCHER — Neural Surveillance Core</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #000000;
            --gray-01: #0a0a0a;
            --gray-02: #111111;
            --gray-03: #1a1a1a;
            --gray-04: #222222;
            --gray-05: #2a2a2a;
            --border-subtle: rgba(255,255,255,0.05);
            --border-active: rgba(255,255,255,0.12);
            --text-primary: #e8e8e8;
            --text-secondary: #888888;
            --accent-cyan: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --accent-amber: #f59e0b;
            --glow: 0 0 10px rgba(59,130,246,0.3);
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'SF Pro Text', monospace;
            font-weight: 400;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* 3D CANVAS - extreme depth & particles */
        canvas#hyper-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* overlay grain texture */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background-image: radial-gradient(rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.35;
        }

        .app {
            position: relative;
            z-index: 3;
            display: flex;
            min-height: 100vh;
            backdrop-filter: blur(0px);
        }

        /* SIDEBAR — minimal brutalist */
        .sidebar {
            width: 260px;
            background: rgba(5,5,5,0.75);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border-subtle);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: fixed;
            height: 100vh;
            z-index: 10;
        }

        .logo-area {
            margin-bottom: 48px;
            padding: 0 8px;
        }

        .watcher-badge {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .watcher-sub {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.03);
            border-color: var(--border-subtle);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(59,130,246,0.08);
            border-color: rgba(59,130,246,0.3);
            color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(59,130,246,0.1);
        }

        /* MAIN CONTENT */
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 36px 44px;
            position: relative;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 44px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-glow {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(120deg, #f0f0f0, #9ca3af);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .ml-pulse {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid var(--border-subtle);
            font-size: 12px;
            font-weight: 500;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green);
            animation: pulse-wave 1.8s infinite;
        }

        @keyframes pulse-wave {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* STAT CARDS - extreme glass */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 42px;
        }

        .stat-card {
            background: rgba(10,10,10,0.55);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            padding: 24px 20px;
            position: relative;
            transition: all 0.25s ease;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .stat-card:hover {
            border-color: var(--border-active);
            transform: translateY(-2px);
            background: rgba(15,15,15,0.7);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .stat-value {
            font-size: 44px;
            font-weight: 700;
            line-height: 1;
            font-family: 'Inter', monospace;
            letter-spacing: -2px;
        }

        /* ADD URL SECTION — minimal */
        .add-panel {
            background: rgba(6,6,6,0.55);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 28px 32px;
            margin-bottom: 40px;
        }

        .form-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .input-group {
            flex: 2;
            min-width: 180px;
        }
        .input-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .watcher-input {
            width: 100%;
            background: var(--gray-02);
            border: 1px solid var(--border-subtle);
            padding: 12px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }
        .watcher-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 1px rgba(59,130,246,0.3);
        }
        .btn {
            padding: 12px 26px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: var(--gray-03);
            color: white;
            border: 1px solid var(--border-subtle);
        }
        .btn-primary {
            background: #1f2937;
            border-color: var(--accent-cyan);
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-primary:hover {
            background: #2d3a4e;
            border-color: #60a5fa;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 11px;
            border-radius: 32px;
        }

        /* TABLE STYLES */
        .data-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 28px 24px;
            margin-bottom: 48px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 12px 8px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-subtle);
        }
        td {
            padding: 14px 8px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .badge {
            font-size: 10px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            background: var(--gray-04);
            display: inline-block;
        }
        .badge-active { background: #14532d; color: #4ade80; }
        .badge-critical { background: #7f1a1a; color: #f87171; }

        /* Change cards */
        .changes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }
        .change-neo {
            background: rgba(8,8,8,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 20px;
            transition: 0.2s;
        }
        .change-neo.crit {
            border-left: 3px solid var(--accent-red);
        }

        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #0a0a0aee;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-active);
            border-radius: 20px;
            padding: 14px 24px;
            z-index: 200;
            display: none;
            font-size: 13px;
            font-weight: 500;
        }

        .empty-message {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
        }

        @media (max-width: 1000px) {
            .sidebar { width: 80px; padding: 20px 12px; }
            .sidebar .nav-item span:first-child { margin: 0 auto; }
            .sidebar .logo-area .watcher-badge, .sidebar .logo-area .watcher-sub, .sidebar .nav-item span:last-child { display: none; }
            .main { margin-left: 80px; padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2,1fr); }
            .changes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<canvas id="hyper-canvas"></canvas>
<div class="grain-overlay"></div>

<div class="app">
    <nav class="sidebar">
        <div class="logo-area">
            <div class="watcher-badge">WATCHER</div>
            <div class="watcher-sub">NEURAL CORE</div>
        </div>
        <div class="nav-item active" data-view="dashboard">
            <span>🌀</span> <span>Matrix</span>
        </div>
        <div class="nav-item" data-view="tracker">
            <span>🔗</span> <span>Targets</span>
        </div>
        <div class="nav-item" data-view="changes">
            <span>⚡</span> <span>Anomalies</span>
        </div>
        <div class="nav-item" id="healthTrigger">
            <span>🤖</span> <span>Core Status</span>
        </div>
    </nav>

    <main class="main">
        <div class="header-row">
            <div class="page-glow">// WATCHER SURVEILLANCE DASH</div>
            <div class="ml-pulse">
                <div class="pulse-dot" id="mlPulseDot"></div>
                <span id="mlTextPrimary">ml.engine: scanning</span>
            </div>
        </div>

        <!-- stats panel -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">TOTAL TARGETS</div><div class="stat-value" id="statTotal">0</div></div>
            <div class="stat-card"><div class="stat-label">ACTIVE STREAMS</div><div class="stat-value" id="statActive" style="color:#22c55e">0</div></div>
            <div class="stat-card"><div class="stat-label">MUTATIONS</div><div class="stat-value" id="statChanges" style="color:#f97316">0</div></div>
            <div class="stat-card"><div class="stat-label">AI LATENCY</div><div class="stat-value" id="statMl" style="font-size: 26px;">—</div></div>
        </div>

        <!-- ADD TARGET PANEL -->
        <div class="add-panel">
            <div class="section-title" style="margin-bottom: 18px;">⤜ ADD NEW TARGET ⤛</div>
            <div class="form-flex">
                <div class="input-group"><label>URL</label><input type="url" id="inputUrl" class="watcher-input" placeholder="https://dark.com/change"></div>
                <div class="input-group"><label>LABEL</label><input type="text" id="inputLabel" class="watcher-input" placeholder="competitor core"></div>
                <div class="input-group"><label>EMAIL</label><input type="email" id="inputEmail" class="watcher-input" placeholder="agent@watch.net"></div>
                <div class="input-group"><label>SCAN INTERVAL</label><select id="inputInterval" class="watcher-input"><option value="1">1h</option><option value="6">6h</option><option value="12">12h</option><option value="24" selected>24h</option></select></div>
                <button class="btn btn-primary" id="addTrackBtn">⟳ INITIATE</button>
            </div>
            <span id="addStatus" style="font-size: 12px; color:#6b7280; margin-top: 12px; display: inline-block;"></span>
        </div>

        <!-- TRACK TABLE -->
        <div class="data-card" id="trackTableCard">
            <div class="section-header"><div class="section-title">🎯 TRACKED URLS</div><button class="btn btn-sm" id="refreshTableBtn">⟳ SYNC</button></div>
            <div id="tracksContainer"> <div class="empty-message">loading neural links...</div> </div>
        </div>

        <!-- RECENT CHANGES SECTION -->
        <div class="data-card">
            <div class="section-title">⚠️ RECENT ANOMALIES</div>
            <div id="changesContainer" class="changes-grid"><div class="empty-message" style="grid-column:span 2">no shift detected</div></div>
        </div>
    </main>
</div>

<div id="toastMsg" class="toast"></div>

<script type="module">
    import * as THREE from 'three';

    // ========== EXTREME 3D SCENE ==========
    const canvasEl = document.getElementById('hyper-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.background = null;
    scene.fog = new THREE.FogExp2(0x000000, 0.008);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 80);
    camera.position.set(0, 1.2, 6);
    camera.lookAt(0, 0, 0);

    // central dark core geometry - 3D wireframe advanced
    const group = new THREE.Group();

    // rotating torus knot
    const knotGeo = new THREE.TorusKnotGeometry(1.2, 0.28, 200, 32, 3, 4);
    const knotMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, wireframe: true, emissive: 0x111122, roughness: 0.7, metalness: 0.8 });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    group.add(knot);

    // outer ring
    const ringGeo = new THREE.TorusGeometry(1.65, 0.05, 128, 200);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, emissive: 0x222222 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    group.add(ring);

    // inner particles cloud
    const particleCount = 2500;
    const particleGeo = new THREE.BufferGeometry();
    const particlePos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        const radius = 1.9 + Math.random() * 0.9;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        particlePos[i*3] = radius * Math.sin(phi) * Math.cos(theta);
        particlePos[i*3+1] = radius * Math.sin(phi) * Math.sin(theta) * 0.6;
        particlePos[i*3+2] = radius * Math.cos(phi);
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
    const partMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.018, transparent: true, opacity: 0.5 });
    const particlesField = new THREE.Points(particleGeo, partMat);
    group.add(particlesField);

    // floating micro debris
    const dustCount = 800;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
        dustPos[i*3] = (Math.random() - 0.5) * 12;
        dustPos[i*3+1] = (Math.random() - 0.5) * 8;
        dustPos[i*3+2] = (Math.random() - 0.5) * 8 - 3;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({ color: 0x9ca3af, size: 0.008, transparent: true });
    const dustField = new THREE.Points(dustGeo, dustMat);
    scene.add(dustField);
    scene.add(group);

    // lighting - dramatic
    const ambientLight = new THREE.AmbientLight(0x111111);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0x3b82f6, 0.5);
    pointLight.position.set(2, 3, 4);
    scene.add(pointLight);
    const backLight = new THREE.PointLight(0xef4444, 0.3);
    backLight.position.set(-2, 1, -3);
    scene.add(backLight);

    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        mouseY = (e.clientY / window.innerHeight - 0.5) * 1.5;
    });

    function animate3D() {
        requestAnimationFrame(animate3D);
        const time = Date.now() * 0.0012;
        knot.rotation.x = time * 0.3;
        knot.rotation.y = time * 0.5;
        ring.rotation.x = time * 0.2;
        ring.rotation.z = time * 0.15;
        particlesField.rotation.y = time * 0.1;
        particlesField.rotation.x = Math.sin(time * 0.2) * 0.1;
        dustField.rotation.y = time * 0.05;
        dustField.rotation.x = mouseY * 0.3;
        group.rotation.y = mouseX * 0.5;
        group.rotation.x = mouseY * 0.3;
        camera.position.x += (mouseX * 0.3 - camera.position.x) * 0.05;
        camera.position.y += (-mouseY * 0.2 - camera.position.y) * 0.05;
        camera.lookAt(0, 0, 0);
        renderer.render(scene, camera);
    }
    animate3D();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ========== APPLICATION LOGIC ==========
    const API = 'http://localhost:6060/api';

    async function loadTracks() {
        try {
            const res = await fetch(`${API}/tracks`);
            const data = await res.json();
            renderTrackTable(data);
            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statActive').innerText = data.filter(t => t.isActive).length;
        } catch(e) {
            document.getElementById('tracksContainer').innerHTML = `<div class="empty-message">⚠️ cannot reach watcher engine (spring boot on 8080?)</div>`;
        }
    }

    function renderTrackTable(tracks) {
        if(!tracks.length) {
            document.getElementById('tracksContainer').innerHTML = `<div class="empty-message">no targets — add above</div>`;
            return;
        }
        const html = `<table><thead><tr><th>LABEL</th><th>URL</th><th>STATUS</th><th>INT.</th><th>CHECKS</th><th>CHANGES</th><th>LAST SCAN</th><th>ACTION</th></tr></thead><tbody>
        ${tracks.map(t => `
        <tr>
            <td style="font-weight:500;">${t.label || 'untitled'}</td>
            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.url.substring(0,40)}</td>
            <td><span class="badge ${t.isActive ? 'badge-active' : ''}" style="${!t.isActive ? 'background:#2a2a2a' : ''}">${t.isActive ? 'ACTIVE' : 'PAUSED'}</span></td>
            <td>${t.checkIntervalHours}h</td><td>${t.totalChecks || 0}</td><td style="color:#f97316;">${t.totalChanges || 0}</td>
            <td style="font-size:11px;">${t.lastCheckedAt ? new Date(t.lastCheckedAt).toLocaleString() : '—'}</td>
            <td><div style="display:flex; gap:8px;"><button class="btn-sm manualCheckBtn" data-id="${t.id}" style="background:#1e293b;">⚡</button><button class="btn-sm toggleTrack" data-id="${t.id}" style="background:#1e1e2f;">${t.isActive ? '⏸' : '▶️'}</button><button class="btn-sm deleteTrack" data-id="${t.id}" style="background:#3c1010;">🗑</button></div></td>
        </tr>`).join('')}
        </tbody></table>`;
        document.getElementById('tracksContainer').innerHTML = html;
        document.querySelectorAll('.manualCheckBtn').forEach(btn => btn.addEventListener('click', (e) => manualCheck(parseInt(btn.dataset.id))));
        document.querySelectorAll('.toggleTrack').forEach(btn => btn.addEventListener('click', (e) => toggleTrack(parseInt(btn.dataset.id))));
        document.querySelectorAll('.deleteTrack').forEach(btn => btn.addEventListener('click', (e) => deleteTrack(parseInt(btn.dataset.id))));
    }

    async function addTrack() {
        const url = document.getElementById('inputUrl').value.trim();
        const label = document.getElementById('inputLabel').value.trim();
        const email = document.getElementById('inputEmail').value.trim();
        const interval = document.getElementById('inputInterval').value;
        if (!url || !email) { showToast("TARGET URL & ALERT EMAIL REQUIRED"); return; }
        document.getElementById('addStatus').innerHTML = '<span style="display: inline-block; width:12px; height:12px; border:2px solid #3b82f6; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite;"></span>';
        try {
            const res = await fetch(`${API}/track`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ url, label, email, intervalHours: parseInt(interval) })
            });
            if(res.ok) {
                showToast("✓ TARGET ADDED • WATCHER ACTIVE");
                document.getElementById('inputUrl').value = ''; document.getElementById('inputLabel').value = '';
                loadTracks(); loadRecentChanges();
            } else { showToast("error: " + (await res.json()).error); }
        } catch(e) { showToast("connection fault"); }
        document.getElementById('addStatus').innerHTML = '';
    }

    async function manualCheck(id) { showToast(`🔍 scanning target #${id}`); try { await fetch(`${API}/check/${id}`, {method:'POST'}); showToast("scan complete • anomalies logged"); loadTracks(); loadRecentChanges(); } catch(e) { showToast("scan failed"); } }
    async function toggleTrack(id) { try { const res = await fetch(`${API}/track/${id}/toggle`, {method:'PUT'}); const data = await res.json(); showToast(data.message); loadTracks(); } catch(e) { showToast("error"); } }
    async function deleteTrack(id) { if(confirm("purge target from watcher?")) { try { await fetch(`${API}/track/${id}`, {method:'DELETE'}); showToast("target erased"); loadTracks(); } catch(e) { showToast("failed"); } } }

    async function loadRecentChanges() {
        try {
            const res = await fetch(`${API}/changes/recent`);
            const changes = await res.json();
            document.getElementById('statChanges').innerText = changes.length;
            const cont = document.getElementById('changesContainer');
            if(!changes.length) { cont.innerHTML = '<div class="empty-message" style="grid-column:span 2">⏳ no mutations detected</div>'; return; }
            cont.innerHTML = changes.map(c => `<div class="change-neo ${c.severity === 'critical' ? 'crit' : ''}">
                <div style="display:flex; justify-content:space-between;"><span style="font-size:12px; color:#aaa;">${c.trackedUrl?.url?.substring(0,50) || 'url'}</span><span class="badge" style="background:#2d2d2d;">${c.severity || 'watch'}</span></div>
                <div style="margin: 12px 0 8px; font-size:13px;">${c.aiSummary || 'structural modification detected'}</div>
                <div style="font-size: 11px; color:#3b82f6;">⚡ ${c.aiAction || 'review recommended'}</div>
                <div style="font-size:10px; margin-top:8px; color:#555;">${c.detectedAt ? new Date(c.detectedAt).toLocaleString() : ''}</div>
            </div>`).join('');
        } catch(e) { console.log(e); }
    }

    async function checkHealth() {
        try {
            const res = await fetch(`${API}/health`);
            const data = await res.json();
            const connected = data.ml_service === 'connected';
            document.getElementById('mlPulseDot').style.background = connected ? '#22c55e' : '#ef4444';
            document.getElementById('mlTextPrimary').innerText = connected ? "ml.engine: ONLINE" : "ml.engine: OFFLINE";
            document.getElementById('statMl').innerHTML = connected ? "<span style='font-size:28px;'>✓</span>" : "✗";
        } catch(e) {
            document.getElementById('mlPulseDot').style.background = '#ef4444';
            document.getElementById('mlTextPrimary').innerText = "core: disconnected";
            document.getElementById('statMl').innerHTML = "✗";
        }
    }

    function showToast(msg) {
        const toastEl = document.getElementById('toastMsg');
        toastEl.innerText = msg;
        toastEl.style.display = 'block';
        setTimeout(() => { toastEl.style.display = 'none'; }, 3300);
    }

    document.getElementById('addTrackBtn').addEventListener('click', addTrack);
    document.getElementById('refreshTableBtn').addEventListener('click', () => { loadTracks(); loadRecentChanges(); });
    document.getElementById('healthTrigger').addEventListener('click', checkHealth);

    // simple nav simulation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            if(this.getAttribute('data-view') === 'tracker') document.getElementById('trackTableCard').scrollIntoView({behavior:'smooth'});
            else if(this.getAttribute('data-view') === 'changes') document.querySelector('.data-card:last-child').scrollIntoView({behavior:'smooth'});
        });
    });

    setInterval(() => { loadTracks(); loadRecentChanges(); checkHealth(); }, 28000);
    loadTracks(); loadRecentChanges(); checkHealth();
    // inject spin keyframe for loader
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(styleSheet);
</script>
</body>
